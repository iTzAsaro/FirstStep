# ╔══════════════════════════════════════════════════════════════════════╗
# ║ deploy-ollama.yml — GitHub Actions                                   ║
# ║ Disparo: manual (workflow_dispatch) o push a main en este archivo.  ║
# ║                                                                      ║
# ║ Ollama no tiene código propio que buildear: se instala directamente  ║
# ║ en la EC2 de IA con el instalador oficial y se gestiona con systemd. ║
# ║ Este workflow levanta/reinicia Ollama y descarga el modelo.          ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🤖 Setup / Restart Ollama (EC2 IA)

on:
  # Manual: úsalo la primera vez o cuando quieras cambiar de modelo
  workflow_dispatch:
    inputs:
      model:
        description: "Modelo Ollama a descargar (ej: llama3, mistral, phi3)"
        required: false
        default: "llama3"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-ollama.yml"

jobs:
  setup-ollama:
    name: Setup Ollama en EC2 IA
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 SSH → instalar/reiniciar Ollama y descargar modelo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_IA }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # timeout generoso porque la descarga del modelo puede tardar
          command_timeout: 30m
          script: |
            set -e

            MODEL="${{ github.event.inputs.model || 'llama3' }}"
            echo "🤖 Modelo seleccionado: $MODEL"

            # ── Instalar Ollama si no está presente ──────────────────────
            if ! command -v ollama &>/dev/null; then
              echo "📦 Instalando Ollama..."
              curl -fsSL https://ollama.com/install.sh | sh
            else
              echo "✅ Ollama ya instalado: $(ollama --version)"
            fi

            # ── Asegurar que el servicio systemd está activo ──────────────
            sudo systemctl enable ollama
            sudo systemctl restart ollama
            sleep 5

            # ── Descargar / actualizar el modelo ─────────────────────────
            echo "⬇️  Descargando modelo $MODEL (puede tardar varios minutos)..."
            ollama pull "$MODEL"

            # ── Verificar que la API responde ─────────────────────────────
            curl -sf http://localhost:11434/api/tags | grep -q "$MODEL" && \
              echo "✅ Modelo $MODEL disponible en Ollama" || \
              echo "⚠️  El modelo puede estar aún procesándose"

            echo "✅ Ollama listo en :11434"
