# ╔══════════════════════════════════════════════════════════════════════╗
# ║ deploy-backend.yml — GitHub Actions                                  ║
# ║ Disparo: push a main con cambios en backend/ o este workflow.        ║
# ║ Pasos: build TS → imagen Docker → push DockerHub → SSH EC2.         ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: ⚙️ Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  # ── Job 1: Build y push de la imagen ─────────────────────────────────
  build-and-push:
    name: Build & Push imagen Docker
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Metadata de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/firststep-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: 🔨 Build y Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy al EC2 de backend ──────────────────────────────────
  deploy:
    name: Deploy a EC2 Backend
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🚀 SSH → pull & run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_BACKEND }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "⬇️  Descargando imagen..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/firststep-backend:latest

            echo "🛑 Deteniendo contenedor anterior..."
            docker stop firststep-backend 2>/dev/null || true
            docker rm   firststep-backend 2>/dev/null || true

            echo "▶️  Iniciando nuevo contenedor..."
            docker run -d \
              --name firststep-backend \
              --restart unless-stopped \
              -p 3001:3001 \
              -e NODE_ENV=production \
              -e PORT=3001 \
              -e DB_TEST_ON_STARTUP=false \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRES_IN="${{ secrets.JWT_EXPIRES_IN }}" \
              -e BCRYPT_ROUNDS="${{ secrets.BCRYPT_ROUNDS }}" \
              -e CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              -e SUPABASE_JWKS_URL="${{ secrets.SUPABASE_JWKS_URL }}" \
              -e SUPABASE_JWKS_BASE64="${{ secrets.SUPABASE_JWKS_BASE64 }}" \
              -e SUPABASE_JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/firststep-backend:latest

            echo "🧹 Limpiando imágenes antiguas..."
            docker image prune -f

            # Verificar que el contenedor levantó bien
            sleep 3
            docker exec firststep-backend wget -qO- http://localhost:3001/health || \
              (echo "❌ Health check falló" && docker logs firststep-backend --tail 30 && exit 1)

            echo "✅ Backend desplegado correctamente"
