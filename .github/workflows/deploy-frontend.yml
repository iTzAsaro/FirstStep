# ╔══════════════════════════════════════════════════════════════════════╗
# ║ deploy-frontend.yml — GitHub Actions                                 ║
# ║ Disparo: push a main con cambios en frontend/ o este workflow.       ║
# ║ Pasos: build TS+Vite → imagen Docker → push DockerHub → SSH EC2.    ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🎨 Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  # ── Job 1: Build y push de la imagen ─────────────────────────────────
  build-and-push:
    name: Build & Push imagen Docker
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Metadata de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/firststep-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: 🔨 Build y Push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_OLLAMA_URL=${{ secrets.VITE_OLLAMA_URL }}
            BACKEND_URL=http://${{ secrets.EC2_HOST_BACKEND }}:3001
            OLLAMA_URL=http://${{ secrets.EC2_HOST_IA }}:11434
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy al EC2 de frontend ─────────────────────────────────
  deploy:
    name: Deploy a EC2 Frontend
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🚀 SSH → pull & run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "⬇️  Descargando imagen..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/firststep-frontend:latest

            echo "🛑 Deteniendo contenedor anterior..."
            docker stop firststep-frontend 2>/dev/null || true
            docker rm   firststep-frontend 2>/dev/null || true

            echo "▶️  Iniciando nuevo contenedor..."
            docker run -d \
              --name firststep-frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/firststep-frontend:latest

            echo "🧹 Limpiando imágenes antiguas..."
            docker image prune -f

            echo "✅ Frontend desplegado correctamente"
