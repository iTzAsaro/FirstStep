# ╔══════════════════════════════════════════════════════════════════════╗
# ║ nginx.conf — Frontend SPA (FirstStep)                                ║
# ╚══════════════════════════════════════════════════════════════════════╝

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS interno de Docker → resuelve upstreams en cada request,
    # no al startup. Así Nginx arranca aunque ollama no esté corriendo.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── Proxy /api/ → Backend ────────────────────────────────────────────
    # El frontend pide /api/auth/register/talent
    # Nginx debe pasar http://backend:3001/api/auth/register/talent
    # → proxy_pass a la raíz del backend, conservando el path completo.
    location /api/ {
        set $backend BACKEND_URL_PLACEHOLDER;
        proxy_pass        $backend;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Proxy /ollama/ → Ollama ──────────────────────────────────────────
    location /ollama/ {
        set $ollama OLLAMA_URL_PLACEHOLDER;
        rewrite ^/ollama/(.*)$ /$1 break;
        proxy_pass        $ollama;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── React Router → index.html ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache assets estáticos ───────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cabeceras de seguridad ───────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}
