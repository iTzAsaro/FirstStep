# ╔══════════════════════════════════════════════════════════════════════╗
# ║ docker-compose.yml — FirstStep  (desarrollo local)                   ║
# ║ DB: Supabase (nube) — no se levanta PostgreSQL local                 ║
# ╚══════════════════════════════════════════════════════════════════════╝

services:

  # ── Backend: Node.js + Express + TypeScript ────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: firststep-backend
    restart: unless-stopped
    env_file:
      - ./.env.local
    ports:
      - "3001:3001"
    # Forzar IPv4 en la resolución DNS del contenedor.
    # Sin esto, Node resuelve Supabase a IPv6 y falla con ENETUNREACH.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_TEST_ON_STARTUP: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      CORS_ORIGIN: "http://localhost:5173"
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-https://xhklhawelqtmxcoqznup.supabase.co/auth/v1/.well-known/jwks.json}
      SUPABASE_JWKS_BASE64: ${SUPABASE_JWKS_BASE64:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
    networks:
      - firststep-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend: React + Vite → Nginx (con proxy /api y /ollama) ─────────
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: "http://backend:3001"
        OLLAMA_URL: "http://ollama:11434"
        VITE_API_URL: "http://localhost:3001"
        VITE_OLLAMA_URL: "http://localhost:11434"
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://xhklhawelqtmxcoqznup.supabase.co}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-sb_publishable_EYbYaXxLNO0yFRZF_R2YEQ_G965JvWQ}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_FEATURE_CV_BUILDER: ${VITE_FEATURE_CV_BUILDER:-false}
        VITE_FEATURE_AI_CHAT: ${VITE_FEATURE_AI_CHAT:-true}
    container_name: firststep-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - firststep-net

  # ── Ollama: LLM local (CPU-only, sin CUDA) ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: firststep-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - firststep-net

networks:
  firststep-net:
    driver: bridge
    # Deshabilitar IPv6 en la red Docker para evitar que los contenedores
    # resuelvan hostnames externos (ej: Supabase) a direcciones IPv6
    enable_ipv6: false

volumes:
  ollama-data:
