# ╔══════════════════════════════════════════════════════════════════════╗
# ║ docker-compose.yml — FirstStep  (desarrollo local)                   ║
# ║ DB: Supabase (no PostgreSQL local)                                   ║
# ╚══════════════════════════════════════════════════════════════════════╝

services:

  # ── Backend: Node.js + Express + TypeScript ────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: firststep-backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "3001:3001"
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 2001:4860:4860::8888
      - 2001:4860:4860::8844
    networks:
      - firststep-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend: React + Vite → Nginx (con proxy /api y /ollama) ─────────
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: "http://backend:3001"
        OLLAMA_URL: "http://ollama:11434"
        VITE_API_URL: "http://localhost:3001"
        VITE_OLLAMA_URL: "http://localhost:11434"
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://xhklhawelqtmxcoqznup.supabase.co}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-sb_publishable_EYbYaXxLNO0yFRZF_R2YEQ_G965JvWQ}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_FEATURE_CV_BUILDER: ${VITE_FEATURE_CV_BUILDER:-false}
        VITE_FEATURE_AI_CHAT: ${VITE_FEATURE_AI_CHAT:-true}
    container_name: firststep-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - firststep-net

  # ── Ollama: LLM local (CPU-only, sin CUDA) ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: firststep-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 2001:4860:4860::8888
      - 2001:4860:4860::8844
    networks:
      - firststep-net

networks:
  firststep-net:
    driver: bridge
    enable_ipv6: true

volumes:
  ollama-data:
